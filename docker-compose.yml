services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Origine autorisée pour les requêtes CORS (doit correspondre à ton domaine)
      - ALLOWED_ORIGIN=https://intheflow.site
    volumes:
      # Bind mount vers le dossier local → le conteneur lit la vraie base SQLite
      - ./backend/data:/app/data
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_URL vide → les appels /api/... sont relatifs, Nginx proxifie
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"     # HTTP → redirigé vers HTTPS par nginx
      - "0.0.0.0:443:443"   # HTTPS
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro  # certificats SSL Let's Encrypt
    depends_on:
      - backend

