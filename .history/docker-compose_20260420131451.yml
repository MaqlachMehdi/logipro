services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Si tu as une clé API geocoding etc., mets-les ici ou dans un .env
      # - GEOCODE_API_KEY=xxxx
    volumes:
      - backend_data:/app/data   # SQLite persiste entre les redémarrages
    expose:
      - "5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"     # Accessible sur http://ton-serveur
      # - "443:443" # À activer avec SSL (voir notes ci-dessous)
    depends_on:
      - backend

volumes:
  backend_data:
