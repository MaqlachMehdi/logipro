services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Ajoute tes clés API ici ou dans un fichier .env à la racine
      # - GEOCODE_API_KEY=xxxx
    volumes:
      # Persiste la base SQLite entre les redémarrages
      - backend_data:/app/data
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_URL vide → les appels /api/... sont relatifs, Nginx proxifie
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
