# Redirige HTTP → HTTPS
server {
    listen 80;
    server_name intheflow.site;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name intheflow.site;

    ssl_certificate     /etc/letsencrypt/live/intheflow.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intheflow.site/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA: renvoie index.html pour toutes les routes frontend
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le backend Node.js
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
        # Timeout genereux pour le solveur (jusqu'à 5min)
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
